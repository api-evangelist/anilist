type PageInfo {
  "The total number of items. Note: This value is not guaranteed to be accurate, do not rely on this for logic"
  total: Int
  "The count on a page"
  perPage: Int
  "The current page"
  currentPage: Int
  "The last page"
  lastPage: Int
  "If there is another page"
  hasNextPage: Boolean
}

"User sort enums"
enum UserSort {
  ID
  ID_DESC
  USERNAME
  USERNAME_DESC
  WATCHED_TIME
  WATCHED_TIME_DESC
  CHAPTERS_READ
  CHAPTERS_READ_DESC
  SEARCH_MATCH
}

"A user"
type User {
  "The id of the user"
  id: Int!
  "The name of the user"
  name: String!
  "The bio written by user (Markdown)"
  about(asHtml: Boolean): String
  "The user's avatar images"
  avatar: UserAvatar
  "The user's banner images"
  bannerImage: String
  "If the authenticated user if following this user"
  isFollowing: Boolean
  "If this user if following the authenticated user"
  isFollower: Boolean
  "If the user is blocked by the authenticated user"
  isBlocked: Boolean
  bans: Json
  "The user's general options"
  options: UserOptions
  "The user's media list options"
  mediaListOptions: MediaListOptions
  "The users favourites"
  favourites(page: Int): Favourites
  "The users anime & manga list statistics"
  statistics: UserStatisticTypes
  "The number of unread notifications the user has"
  unreadNotificationCount: Int
  "The url for the user page on the AniList website"
  siteUrl: String
  "The donation tier of the user"
  donatorTier: Int
  "Custom donation badge text"
  donatorBadge: String
  "The user's moderator roles if they are a site moderator"
  moderatorRoles: [ModRole]
  "When the user's account was created. (Does not exist for accounts created before 2020)"
  createdAt: Int
  "When the user's data was last updated"
  updatedAt: Int
  "The user's statistics"
  stats: UserStats @deprecated
  "If the user is a moderator or data moderator"
  moderatorStatus: String @deprecated
  "The user's previously used names."
  previousNames: [UserPreviousName]
}

"A user's avatars"
type UserAvatar {
  "The avatar of user at its largest size"
  large: String
  "The avatar of user at medium size"
  medium: String
}

scalar Json

"A user's general options"
type UserOptions {
  "The language the user wants to see media titles in"
  titleLanguage: UserTitleLanguage
  "Whether the user has enabled viewing of 18+ content"
  displayAdultContent: Boolean
  "Whether the user receives notifications when a show they are watching aires"
  airingNotifications: Boolean
  "Profile highlight color (blue, purple, pink, orange, red, green, gray)"
  profileColor: String
  "Notification options"
  notificationOptions: [NotificationOption]
  "The user's timezone offset (Auth user only)"
  timezone: String
  "Minutes between activity for them to be merged together. 0 is Never, Above 2 weeks (20160 mins) is Always."
  activityMergeTime: Int
  "The language the user wants to see staff and character names in"
  staffNameLanguage: UserStaffNameLanguage
  "Whether the user only allow messages from users they follow"
  restrictMessagesToFollowing: Boolean
  "The list activity types the user has disabled from being created from list updates"
  disabledListActivity: [ListActivityOption]
}

"The language the user wants to see media titles in"
enum UserTitleLanguage {
  "The romanization of the native language title"
  ROMAJI
  "The official english title"
  ENGLISH
  "Official title in it's native language"
  NATIVE
  "The romanization of the native language title, stylised by media creator"
  ROMAJI_STYLISED
  "The official english title, stylised by media creator"
  ENGLISH_STYLISED
  "Official title in it's native language, stylised by media creator"
  NATIVE_STYLISED
}

"Notification option"
type NotificationOption {
  "The type of notification"
  type: NotificationType
  "Whether this type of notification is enabled"
  enabled: Boolean
}

"Notification type enum"
enum NotificationType {
  "A user has sent you message"
  ACTIVITY_MESSAGE
  "A user has replied to your activity"
  ACTIVITY_REPLY
  "A user has followed you"
  FOLLOWING
  "A user has mentioned you in their activity"
  ACTIVITY_MENTION
  "A user has mentioned you in a forum comment"
  THREAD_COMMENT_MENTION
  "A user has commented in one of your subscribed forum threads"
  THREAD_SUBSCRIBED
  "A user has replied to your forum comment"
  THREAD_COMMENT_REPLY
  "An anime you are currently watching has aired"
  AIRING
  "A user has liked your activity"
  ACTIVITY_LIKE
  "A user has liked your activity reply"
  ACTIVITY_REPLY_LIKE
  "A user has liked your forum thread"
  THREAD_LIKE
  "A user has liked your forum comment"
  THREAD_COMMENT_LIKE
  "A user has replied to activity you have also replied to"
  ACTIVITY_REPLY_SUBSCRIBED
  "A new anime or manga has been added to the site where its related media is on the user's list"
  RELATED_MEDIA_ADDITION
  "An anime or manga has had a data change that affects how a user may track it in their lists"
  MEDIA_DATA_CHANGE
  "Anime or manga entries on the user's list have been merged into a single entry"
  MEDIA_MERGE
  "An anime or manga on the user's list has been deleted from the site"
  MEDIA_DELETION
  "A user's submission has been accepted, partially accepted, or rejected"
  MEDIA_SUBMISSION_UPDATE
  "A user's staff submission has been accepted, partially accepted, or rejected"
  STAFF_SUBMISSION_UPDATE
  "A user's character submission has been accepted, partially accepted, or rejected"
  CHARACTER_SUBMISSION_UPDATE
}

"The language the user wants to see staff and character names in"
enum UserStaffNameLanguage {
  "The romanization of the staff or character's native name, with western name ordering"
  ROMAJI_WESTERN
  "The romanization of the staff or character's native name"
  ROMAJI
  "The staff or character's name in their native language"
  NATIVE
}

type ListActivityOption {
  disabled: Boolean
  type: MediaListStatus
}

"Media list watching/reading status enum."
enum MediaListStatus {
  "Currently watching/reading"
  CURRENT
  "Planning to watch/read"
  PLANNING
  "Finished watching/reading"
  COMPLETED
  "Stopped watching/reading before completing"
  DROPPED
  "Paused watching/reading"
  PAUSED
  "Re-watching/reading"
  REPEATING
}

"A user's list options"
type MediaListOptions {
  "The score format the user is using for media lists"
  scoreFormat: ScoreFormat
  "The default order list rows should be displayed in"
  rowOrder: String
  useLegacyLists: Boolean @deprecated
  "The user's anime list options"
  animeList: MediaListTypeOptions
  "The user's manga list options"
  mangaList: MediaListTypeOptions
  "The list theme options for both lists"
  sharedTheme: Json @deprecated
  "If the shared theme should be used instead of the individual list themes"
  sharedThemeEnabled: Boolean @deprecated
}

"Media list scoring type"
enum ScoreFormat {
  "An integer from 0-100"
  POINT_100
  "A float from 0-10 with 1 decimal place"
  POINT_10_DECIMAL
  "An integer from 0-10"
  POINT_10
  "An integer from 0-5. Should be represented in Stars"
  POINT_5
  "An integer from 0-3. Should be represented in Smileys. 0 => No Score, 1 => :(, 2 => :|, 3 => :)"
  POINT_3
}

"A user's list options for anime or manga lists"
type MediaListTypeOptions {
  "The order each list should be displayed in"
  sectionOrder: [String]
  "If the completed sections of the list should be separated by format"
  splitCompletedSectionByFormat: Boolean
  "The list theme options"
  theme: Json @deprecated
  "The names of the user's custom lists"
  customLists: [String]
  "The names of the user's advanced scoring sections"
  advancedScoring: [String]
  "If advanced scoring is enabled"
  advancedScoringEnabled: Boolean
}

"User's favourite anime, manga, characters, staff & studios"
type Favourites {
  "Favourite anime"
  anime(page: Int, perPage: Int): MediaConnection
  "Favourite manga"
  manga(page: Int, perPage: Int): MediaConnection
  "Favourite characters"
  characters(page: Int, perPage: Int): CharacterConnection
  "Favourite staff"
  staff(page: Int, perPage: Int): StaffConnection
  "Favourite studios"
  studios(page: Int, perPage: Int): StudioConnection
}

type MediaConnection {
  edges: [MediaEdge]
  nodes: [Media]
  "The pagination information"
  pageInfo: PageInfo
}

"Media connection edge"
type MediaEdge {
  node: Media
  "The id of the connection"
  id: Int
  "The type of relation to the parent model"
  relationType(version: Int): MediaRelation
  "If the studio is the main animation studio of the media (For Studio->MediaConnection field only)"
  isMainStudio: Boolean!
  "The characters in the media voiced by the parent actor"
  characters: [Character]
  "The characters role in the media"
  characterRole: CharacterRole
  "Media specific character name"
  characterName: String
  "Notes regarding the VA's role for the character"
  roleNotes: String
  "Used for grouping roles where multiple dubs exist for the same language. Either dubbing company name or language variant."
  dubGroup: String
  "The role of the staff member in the production of the media"
  staffRole: String
  "The voice actors of the character"
  voiceActors(language: StaffLanguage, sort: [StaffSort]): [Staff]
  "The voice actors of the character with role date"
  voiceActorRoles(language: StaffLanguage, sort: [StaffSort]): [StaffRoleType]
  "The order the media should be displayed from the users favourites"
  favouriteOrder: Int
}

"Anime or Manga"
type Media {
  "The id of the media"
  id: Int!
  "The mal id of the media"
  idMal: Int
  "The official titles of the media in various languages"
  title: MediaTitle
  "The type of the media; anime or manga"
  type: MediaType
  "The format the media was released in"
  format: MediaFormat
  "The current releasing status of the media"
  status(version: Int): MediaStatus
  "Short description of the media's story and characters"
  description(asHtml: Boolean): String
  "The first official release date of the media"
  startDate: FuzzyDate
  "The last official release date of the media"
  endDate: FuzzyDate
  "The season the media was initially released in"
  season: MediaSeason
  "The season year the media was initially released in"
  seasonYear: Int
  "The year & season the media was initially released in"
  seasonInt: Int
  "The amount of episodes the anime has when complete"
  episodes: Int
  "The general length of each anime episode in minutes"
  duration: Int
  "The amount of chapters the manga has when complete"
  chapters: Int
  "The amount of volumes the manga has when complete"
  volumes: Int
  "Where the media was created. (ISO 3166-1 alpha-2)"
  countryOfOrigin: CountryCode
  "If the media is officially licensed or a self-published doujin release"
  isLicensed: Boolean
  "Source type the media was adapted from."
  source(version: Int): MediaSource
  "Official Twitter hashtags for the media"
  hashtag: String
  "Media trailer or advertisement"
  trailer: MediaTrailer
  "When the media's data was last updated"
  updatedAt: Int
  "The cover images of the media"
  coverImage: MediaCoverImage
  "The banner image of the media"
  bannerImage: String
  "The genres of the media"
  genres: [String]
  "Alternative titles of the media"
  synonyms: [String]
  "A weighted average score of all the user's scores of the media"
  averageScore: Int
  "Mean score of all the user's scores of the media"
  meanScore: Int
  "The number of users with the media on their list"
  popularity: Int
  "Locked media may not be added to lists our favorited. This may be due to the entry pending for deletion or other reasons."
  isLocked: Boolean
  "The amount of related activity in the past hour"
  trending: Int
  "The amount of user's who have favourited the media"
  favourites: Int
  "List of tags that describes elements and themes of the media"
  tags: [MediaTag]
  "Other media in the same or connecting franchise"
  relations: MediaConnection
  "The characters in the media"
  characters(sort: [CharacterSort], role: CharacterRole, page: Int, perPage: Int): CharacterConnection
  "The staff who produced the media"
  staff(sort: [StaffSort], page: Int, perPage: Int): StaffConnection
  "The companies who produced the media"
  studios(sort: [StudioSort], isMain: Boolean): StudioConnection
  "If the media is marked as favourite by the current authenticated user"
  isFavourite: Boolean!
  "If the media is blocked from being added to favourites"
  isFavouriteBlocked: Boolean!
  "If the media is intended only for 18+ adult audiences"
  isAdult: Boolean
  "The media's next episode airing schedule"
  nextAiringEpisode: AiringSchedule
  "The media's entire airing schedule"
  airingSchedule(notYetAired: Boolean, page: Int, perPage: Int): AiringScheduleConnection
  "The media's daily trend stats"
  trends(sort: [MediaTrendSort], releasing: Boolean, page: Int, perPage: Int): MediaTrendConnection
  "External links to another site related to the media"
  externalLinks: [MediaExternalLink]
  "Data and links to legal streaming episodes on external sites"
  streamingEpisodes: [MediaStreamingEpisode]
  "The ranking of the media in a particular time span and format compared to other media"
  rankings: [MediaRank]
  "The authenticated user's media list entry for the media"
  mediaListEntry: MediaList
  "User reviews of the media"
  reviews(limit: Int, sort: [ReviewSort], page: Int, perPage: Int): ReviewConnection
  "User recommendations for similar media"
  recommendations(sort: [RecommendationSort], page: Int, perPage: Int): RecommendationConnection
  stats: MediaStats
  "The url for the media page on the AniList website"
